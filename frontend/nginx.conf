server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API routes — all prefixed with /api to avoid conflicts with SPA routes

    # task-service
    location /api/items {
        proxy_pass http://task-service:3000/items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth {
        proxy_pass http://task-service:3000/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # project-service
    location /api/projects {
        proxy_pass http://project-service:3002/projects;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # notification-service
    location /api/notifications {
        proxy_pass http://notification-service:3003/notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA: all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
